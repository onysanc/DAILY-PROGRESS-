<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logistics Dispatch Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .hidden { display: none !important; }
        .disabled-checkbox { opacity: 0.4; cursor: not-allowed; }
    </style>
</head>
<body class="bg-gray-100 font-sans h-screen">

    <div id="login-screen" class="absolute inset-0 bg-slate-900 z-[100] flex items-center justify-center">
        <div class="bg-white p-8 rounded-lg shadow-xl w-96">
            <h1 class="text-2xl font-bold mb-6 text-center text-slate-800">Dispatch Login</h1>
            <form onsubmit="App.login(event)" class="space-y-4">
                <input type="text" id="login-username" placeholder="Username" class="w-full p-2 border rounded" required>
                <input type="password" id="login-password" placeholder="Password" class="w-full p-2 border rounded" required>
                <button type="submit" class="w-full bg-blue-600 text-white font-bold py-2 rounded hover:bg-blue-700">Log In</button>
            </form>
        </div>
    </div>

    <div id="app-wrapper" class="hidden flex h-full">
        <aside class="w-64 bg-slate-900 text-white p-6">
            <h2 class="text-xl font-bold mb-4">Dispatch System</h2>
            <p class="text-sm text-slate-400">User: <span id="display-username" class="text-white font-bold"></span></p>
            <button onclick="location.reload()" class="text-xs text-red-400 underline mt-2">Logout</button>
        </aside>

        <main class="flex-1 p-8 overflow-y-auto">
            <h1 class="text-3xl font-bold mb-6">Dispatch Activity</h1>
            <select id="rdd-selector" onchange="App.selectRDD(this.value)" class="p-2 border rounded mb-6 w-64"></select>
            
            <div class="bg-white rounded shadow overflow-x-auto">
                <table class="w-full text-sm text-left">
                    <thead class="bg-gray-50 border-b">
                        <tr>
                            <th class="p-3">Type</th><th class="p-3">No.</th>
                            <th class="p-3">Pick</th><th class="p-3">PGI</th><th class="p-3">Invoice</th>
                            <th class="p-3">DS Print</th><th class="p-3">Check</th><th class="p-3">Loaded</th>
                        </tr>
                    </thead>
                    <tbody id="dispatch-tbody"></tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        // CONFIGURATION PRE-FILLED
        const supabase = supabase.createClient(
            'https://kxvvpmkmpxbwonkfmsnm.supabase.co', 
            'sb_publishable_X4L1aLxAZKCR-MGPxkcfsQ_-UQl9iHc'
        );

        const USERS = {
            'admin': { pass: 'superadmin', role: 'admin' },
            'outbound': { pass: 'outbound', role: 'outbound' },
            'pgi': { pass: 'pgi', role: 'pgi' },
            'invoice': { pass: 'invoice', role: 'invoice' },
            'transport': { pass: 'transport', role: 'transport' }
        };

        const PERMS = {
            'admin': ['pick', 'pgi', 'invoiced', 'ds_printed', 'checking', 'loaded'],
            'outbound': ['pick', 'pgi', 'checking', 'ds_printed', 'loaded'],
            'pgi': ['pgi'],
            'invoice': ['invoiced'],
            'transport': ['ds_printed', 'loaded']
        };

        const App = {
            state: { user: null, currentRddId: null, flow: ['pick', 'pgi', 'invoiced', 'ds_printed', 'checking', 'loaded'] },

            login(e) {
                e.preventDefault();
                const u = document.getElementById('login-username').value.toLowerCase();
                const p = document.getElementById('login-password').value;
                if(USERS[u] && USERS[u].pass === p) {
                    this.state.user = { name: u, role: USERS[u].role };
                    document.getElementById('login-screen').classList.add('hidden');
                    document.getElementById('app-wrapper').classList.remove('hidden');
                    document.getElementById('display-username').textContent = u.toUpperCase();
                    this.init();
                } else { alert("Invalid credentials"); }
            },

            async init() {
                const { data } = await supabase.from('rdd_masters').select('*');
                const sel = document.getElementById('rdd-selector');
                sel.innerHTML = '<option value="">Select RDD</option>';
                data.forEach(r => sel.innerHTML += `<option value="${r.id}">${r.rdd_date}</option>`);
            },

            async selectRDD(id) {
                this.state.currentRddId = id;
                const { data } = await supabase.from('dispatches').select('*').eq('rdd_id', id);
                const tbody = document.getElementById('dispatch-tbody');
                tbody.innerHTML = '';
                const allowed = PERMS[this.state.user.role];

                data.forEach(d => {
                    let row = `<tr><td class="p-3">${d.truck_type}</td><td class="p-3">${d.dispatch_number}</td>`;
                    this.state.flow.forEach(step => {
                        const can = allowed.includes(step);
                        row += `<td class="p-3 text-center"><input type="checkbox" ${d[step+'_checked'] ? 'checked' : ''} ${!can ? 'disabled class="disabled-checkbox"' : ''} onchange="App.toggle('${d.id}', '${step}', this.checked)"></td>`;
                    });
                    tbody.innerHTML += row + `</tr>`;
                });
            },

            async toggle(id, step, val) {
                await supabase.from('dispatches').update({ [step+'_checked']: val }).eq('id', id);
                this.selectRDD(this.state.currentRddId);
            }
        };
    </script>
</body>
</html>
