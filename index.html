<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dispatch Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0b0f19] min-h-screen flex flex-col items-center justify-center font-sans antialiased text-slate-200 p-6">

    <div class="w-full max-w-4xl flex flex-col md:flex-row items-center justify-around gap-12">
        
        <div class="bg-[#151c2e] w-full max-w-md p-8 rounded-xl shadow-xl border border-slate-800/50">
            <h1 class="text-2xl font-bold text-white mb-1 tracking-tight">Dispatch Tracker</h1>
            <p class="text-sm text-slate-400 mb-6">Sign in with your username.</p>
            
            <form class="space-y-4" onsubmit="event.preventDefault();">
                <div>
                    <label for="username" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Username</label>
                    <input type="text" id="username" name="username" autocomplete="off"
                        class="w-full bg-[#1e2640] border border-slate-700/50 rounded-lg px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all">
                </div>
                
                <div>
                    <label for="password" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Password</label>
                    <input type="password" id="password" name="password"
                        class="w-full bg-[#1e2640] border border-slate-700/50 rounded-lg px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all">
                </div>
                
                <button type="submit" 
                    class="w-full bg-[#1d5bf7] hover:bg-blue-600 text-white font-semibold py-3 px-4 rounded-lg shadow-lg shadow-blue-500/20 transition-colors mt-2">
                    Log In
                </button>
            </form>
        </div>


        <div class="flex flex-col items-center">
            <p class="text-xs text-slate-500 mb-2 uppercase tracking-widest font-bold">Dashboard Tooltip Component</p>
            
            <div class="bg-[#262626] w-52 p-4 rounded-xl shadow-2xl border border-neutral-700/40 font-sans text-sm tracking-wide text-white">
                <div class="font-bold text-base mb-3 text-slate-100">16:00</div>
                
                <ul class="space-y-2">
                    <li class="flex items-center gap-2">
                        <span class="w-4 h-4 bg-[#3b82f6] rounded-sm shrink-0 border border-white/10"></span>
                        <span class="text-neutral-300">Pick: <strong class="text-white font-semibold">4</strong></span>
                    </li>
                    <li class="flex items-center gap-2">
                        <span class="w-4 h-4 bg-[#a855f7] rounded-sm shrink-0 border border-white/10"></span>
                        <span class="text-neutral-300">PGI: <strong class="text-white font-semibold">4</strong></span>
                    </li>
                    <li class="flex items-center gap-2">
                        <span class="w-4 h-4 bg-[#ec4899] rounded-sm shrink-0 border border-white/10"></span>
                        <span class="text-neutral-300">Invoice: <strong class="text-white font-semibold">3</strong></span>
                    </li>
                    <li class="flex items-center gap-2">
                        <span class="w-4 h-4 bg-[#06b6d4] rounded-sm shrink-0 border border-white/10"></span>
                        <span class="text-neutral-300">DS Printed: <strong class="text-white font-semibold">3</strong></span>
                    </li>
                    <li class="flex items-center gap-2">
                        <span class="w-4 h-4 bg-[#f59e0b] rounded-sm shrink-0 border border-white/10"></span>
                        <span class="text-neutral-300">Check: <strong class="text-white font-semibold">3</strong></span>
                    </li>
                    <li class="flex items-center gap-2">
                        <span class="w-4 h-4 bg-[#10b981] rounded-sm shrink-0 border border-white/10"></span>
                        <span class="text-neutral-300">Loaded: <strong class="text-white font-semibold">1</strong></span>
                    </li>
                    <li class="flex items-center gap-2">
                        <span class="w-4 h-4 bg-[#ef4444] rounded-sm shrink-0 border border-white/10"></span>
                        <span class="text-neutral-300">Avail. Trucks: <strong class="text-white font-semibold">0</strong></span>
                    </li>
                </ul>
            </div>
        </div>

    </div>

</body>
</html>
