<script>
        // SUPABASE CONFIGURATION
        const SUPABASE_URL = 'https://kxvvpmkmpxbwonkfmsnm.supabase.co/rest/v1/'; // <-- Paste your URL here
        const SUPABASE_ANON_KEY = 'sb_publishable_X4L1aLxAZKCR-MGPxkcfsQ_-UQl9iHc'; // <-- Paste your Key here
        
        // FIX: Renamed the initialized client to 'supabaseClient' to avoid naming collisions
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const App = {
            state: {
                currentRddId: null,
                dispatches: [],
                trucks: [],
                pendingMilestoneUpdate: null, 
                milestoneFlow: ['pick', 'pgi', 'invoiced', 'ds_printed', 'checking', 'loaded'],
                chartInstance: null
            },

            // --- INITIALIZATION ---
            async init() {
                await this.loadRDDs();
                await this.loadTrucks();
                this.setupRealtimeSubscriptions();
            },

            // --- UI & TABS ---
            switchTab(tabId) {
                document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
                document.getElementById(tabId).classList.remove('hidden');
                
                // Reset tab colors
                ['dispatch', 'trucks', 'analytics'].forEach(t => {
                    document.getElementById(`btn-tab-${t}`).classList.remove('bg-blue-600');
                    document.getElementById(`btn-tab-${t}`).classList.add('hover:bg-slate-800');
                });
                document.getElementById(`btn-tab-${tabId.replace('tab-', '')}`).classList.add('bg-blue-600');
                document.getElementById(`btn-tab-${tabId.replace('tab-', '')}`).classList.remove('hover:bg-slate-800');

                if (tabId === 'tab-analytics') this.renderChart();
            },

            openModal(id) { document.getElementById(id).classList.remove('hidden'); },
            closeModal(id) { document.getElementById(id).classList.add('hidden'); },

            // --- DATA LOADING ---
            async loadRDDs() {
                const { data, error } = await supabaseClient.from('rdd_masters').select('*').order('rdd_date', { ascending: false });
                if (error) return console.error(error);
                
                const selector = document.getElementById('rdd-selector');
                selector.innerHTML = '<option value="">Select RDD...</option>';
                data.forEach(rdd => {
                    const opt = document.createElement('option');
                    opt.value = rdd.id;
                    opt.textContent = `${rdd.rdd_date} (Plan: ${rdd.initial_planning_count})`;
                    selector.appendChild(opt);
                });
            },

            async selectRDD(id) {
                this.state.currentRddId = id;
                if(!id) {
                    document.getElementById('dispatch-tbody').innerHTML = '';
                    return;
                }
                await this.loadDispatches();
            },

            async loadDispatches() {
                const { data, error } = await supabaseClient.from('dispatches')
                    .select('*').eq('rdd_id', this.state.currentRddId).order('created_at', { ascending: true });
                if (error) return console.error(error);
                
                this.state.dispatches = data;
                this.renderDispatches();
            },

            async loadTrucks() {
                const { data, error } = await supabaseClient.from('available_trucks').select('*').order('created_at', { ascending: true });
                if (error) return console.error(error);
                
                this.state.trucks = data;
                this.renderTrucks();
            },

            // --- DISPATCH RENDERING & LOGIC ---
            renderDispatches() {
                const tbody = document.getElementById('dispatch-tbody');
                tbody.innerHTML = '';
                
                this.state.dispatches.forEach(d => {
                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-gray-50";

                    let html = `<td class="p-3 font-semibold">${d.truck_type}</td>
                                <td class="p-3">${d.dispatch_number}</td>`;
                    
                    this.state.milestoneFlow.forEach((step, index) => {
                        const isChecked = d[`${step}_checked`];
                        const prevStep = index === 0 ? null : this.state.milestoneFlow[index - 1];
                        const isEnabled = prevStep === null ? true : d[`${prevStep}_checked`];
                        
                        html += `
                            <td class="p-3 text-center">
                                <input type="checkbox" class="w-5 h-5 cursor-pointer ${!isEnabled ? 'disabled-checkbox' : ''}" 
                                       ${isChecked ? 'checked' : ''} 
                                       ${!isEnabled ? 'disabled' : ''}
                                       onclick="App.handleMilestoneClick(event, '${d.id}', '${step}')">
                            </td>`;
                    });

                    html += `
                        <td class="p-3">
                            <span class="px-2 py-1 text-xs font-bold rounded bg-blue-100 text-blue-800">${d.status}</span>
                        </td>
                        <td class="p-3">
                            <div class="w-full bg-gray-200 rounded-full h-2.5">
                                <div class="bg-blue-600 h-2.5 rounded-full" style="width: ${d.progress}%"></div>
                            </div>
                        </td>`;
                    
                    tr.innerHTML = html;
                    tbody.appendChild(tr);
                });
            },

            handleMilestoneClick(event, dispatchId, step) {
                event.preventDefault(); 
                const dispatch = this.state.dispatches.find(d => d.id === dispatchId);
                const isCurrentlyChecked = dispatch[`${step}_checked`];

                if (isCurrentlyChecked) {
                    this.uncheckMilestoneCascade(dispatch, step);
                } else {
                    this.state.pendingMilestoneUpdate = { dispatch, step, checkboxElement: event.target };
                    if (step === 'pick') this.openModal('pick-modal');
                    else if (step === 'checking') this.openModal('checking-modal');
                    else if (step === 'loaded') this.openLoadedModal(dispatch);
                    else this.confirmMilestone(step); 
                }
            },

            openLoadedModal(dispatch) {
                const select = document.getElementById('loaded-truck');
                select.innerHTML = '<option value="">Select a truck...</option>';
                
                const available = this.state.trucks.filter(t => t.truck_type === dispatch.truck_type && t.status === 'Available');
                if(available.length === 0) {
                    alert(`No available ${dispatch.truck_type} trucks! Please add one in Available Trucks.`);
                    return;
                }
                
                available.forEach(t => {
                    const opt = document.createElement('option');
                    opt.value = t.id;
                    opt.textContent = t.plate_number;
                    select.appendChild(opt);
                });
                this.openModal('loaded-modal');
            },

            cancelMilestone() {
                this.state.pendingMilestoneUpdate = null;
                document.querySelectorAll('[id$="-modal"]').forEach(m => m.classList.add('hidden'));
            },

            async confirmMilestone(step) {
                const { dispatch } = this.state.pendingMilestoneUpdate;
                const updatePayload = { 
                    [`${step}_checked`]: true, 
                    [`${step}_timestamp`]: new Date().toISOString() 
                };

                if (step === 'pick') {
                    updatePayload.pick_assigned_name = document.getElementById('pick-name').value;
                } else if (step === 'checking') {
                    const names = document.getElementById('checking-names').value.split(',').map(n => n.trim()).filter(n => n);
                    if (names.length < 1 || names.length > 6) return alert('Enter 1 to 6 names.');
                    updatePayload.checking_assigned_names = names;
                    updatePayload.bay_location = document.getElementById('checking-bay').value;
                } else if (step === 'loaded') {
                    const truckId = document.getElementById('loaded-truck').value;
                    if (!truckId) return alert('Select a truck.');
                    updatePayload.assigned_truck_id = truckId;
                    
                    await supabaseClient.from('available_trucks').update({ status: 'Dispatched' }).eq('id', truckId);
                }

                this.finalizeMilestoneUpdate(dispatch, updatePayload, step);
                this.cancelMilestone(); 
            },

            async uncheckMilestoneCascade(dispatch, step) {
                const startIndex = this.state.milestoneFlow.indexOf(step);
                const stepsToUncheck = this.state.milestoneFlow.slice(startIndex);
                
                const updatePayload = {};
                stepsToUncheck.forEach(s => {
                    updatePayload[`${s}_checked`] = false;
                    updatePayload[`${s}_timestamp`] = null;
                    if(s === 'pick') updatePayload.pick_assigned_name = null;
                    if(s === 'checking') { updatePayload.checking_assigned_names = null; updatePayload.bay_location = null; }
                    if(s === 'loaded' && dispatch.assigned_truck_id) {
                        supabaseClient.from('available_trucks').update({ status: 'Available' }).eq('id', dispatch.assigned_truck_id).then();
                        updatePayload.assigned_truck_id = null;
                    }
                });

                const prevStepIndex = startIndex - 1;
                let newStatus = 'Pending';
                if (prevStepIndex >= 0) newStatus = this.formatStatus(this.state.milestoneFlow[prevStepIndex]);
                updatePayload.status = newStatus;
                
                const tickedCount = this.state.milestoneFlow.filter(s => dispatch[`${s}_checked`] && !stepsToUncheck.includes(s)).length;
                updatePayload.progress = (tickedCount / 6) * 100;

                await supabaseClient.from('dispatches').update(updatePayload).eq('id', dispatch.id);
                await this.loadDispatches();
                await this.loadTrucks();
            },

            async finalizeMilestoneUpdate(dispatch, payload, currentStep) {
                payload.status = this.formatStatus(currentStep);
                
                let tickedCount = 0;
                this.state.milestoneFlow.forEach(s => {
                    if (dispatch[`${s}_checked`] || s === currentStep) tickedCount++;
                });
                payload.progress = (tickedCount / 6) * 100;

                await supabaseClient.from('dispatches').update(payload).eq('id', dispatch.id);
                await this.loadDispatches();
                await this.loadTrucks();
            },

            formatStatus(step) {
                const map = {
                    'pick': 'Picked', 'pgi': 'PGI Done', 'invoiced': 'Invoiced', 
                    'ds_printed': 'DS Printed', 'checking': 'Checked', 'loaded': 'Loaded'
                };
                return map[step] || 'Pending';
            },

            // --- DATA ENTRY (CREATE) ---
            async createRDD() {
                // Changed from 'new-rdd-date' to accommodate text if you altered it earlier, 
                // but if using the original HTML, it relies on standard date picker.
                const rdd_date = document.getElementById('new-rdd-date').value;
                const count = document.getElementById('new-rdd-count').value;
                if(!rdd_date || !count) return alert("Fill all fields");

                const { error } = await supabaseClient.from('rdd_masters').insert({ rdd_date, initial_planning_count: parseInt(count) });
                if(error) return alert(error.message);
                
                this.closeModal('rdd-modal');
                await this.loadRDDs();
            },

            async addSingleDispatch(e) {
                e.preventDefault();
                if(!this.state.currentRddId) return alert("Select an RDD first!");
                
                const truck_type = document.getElementById('single-truck-type').value;
                const dispatch_number = document.getElementById('single-dispatch-no').value;

                await supabaseClient.from('dispatches').insert({ rdd_id: this.state.currentRddId, truck_type, dispatch_number });
                e.target.reset();
                await this.loadDispatches();
            },

            async addMassDispatch(e) {
                e.preventDefault();
                if(!this.state.currentRddId) return alert("Select an RDD first!");

                const text = document.getElementById('mass-dispatch-input').value;
                const lines = text.split('\n');
                const inserts = [];

                lines.forEach(line => {
                    const parts = line.trim().split(/\s+/);
                    if (parts.length >= 2) {
                        inserts.push({
                            rdd_id: this.state.currentRddId,
                            truck_type: parts[0],
                            dispatch_number: parts[1]
                        });
                    }
                });

                if(inserts.length > 0) {
                    await supabaseClient.from('dispatches').insert(inserts);
                    document.getElementById('mass-dispatch-input').value = '';
                    await this.loadDispatches();
                }
            },

            // --- TRUCK MANAGEMENT ---
            async addTruck() {
                const truck_type = document.getElementById('truck-type-input').value;
                const plate_number = document.getElementById('truck-plate-input').value.toUpperCase();
                if(!plate_number) return;

                const { error } = await supabaseClient.from('available_trucks').insert({ truck_type, plate_number });
                if(error) alert(error.message);
                else {
                    document.getElementById('truck-plate-input').value = '';
                    await this.loadTrucks();
                }
            },

            renderTrucks() {
                const grid = document.getElementById('trucks-grid');
                grid.innerHTML = '';
                const types = ['AUV', '4W', '6W', '10W', '20F', '40F'];
                
                types.forEach(type => {
                    const available = this.state.trucks.filter(t => t.truck_type === type && t.status === 'Available');
                    
                    let html = `<div class="bg-gray-50 border rounded p-4">
                                    <h3 class="font-bold text-lg mb-2 border-b pb-1">${type} Series</h3>
                                    <ul class="space-y-1">`;
                    
                    available.forEach((t, i) => {
                        html += `<li class="flex justify-between text-sm">
                                    <span>${type} ${i+1}: <b>${t.plate_number}</b></span>
                                 </li>`;
                    });

                    if(available.length === 0) html += `<li class="text-sm text-gray-400 italic">No trucks available</li>`;
                    html += `</ul></div>`;
                    grid.innerHTML += html;
                });
            },

            // --- ANALYTICS DASHBOARD ---
            async renderChart() {
                const ctx = document.getElementById('activityChart').getContext('2d');
                if (this.state.chartInstance) this.state.chartInstance.destroy();
                
                const labels = Array.from({length: 24}, (_, i) => {
                    let h = (i + 5) % 24;
                    return h + ':00';
                });

                const makeMockData = (base) => labels.map(() => Math.floor(Math.random() * base));

                const config = {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [
                            { label: 'Pick', data: makeMockData(20), backgroundColor: '#3b82f6' },
                            { label: 'PGI', data: makeMockData(18), backgroundColor: '#8b5cf6' },
                            { label: 'Invoice', data: makeMockData(15), backgroundColor: '#ec4899' },
                            { label: 'Check', data: makeMockData(12), backgroundColor: '#f59e0b' },
                            { label: 'Loaded', data: makeMockData(10), backgroundColor: '#10b981' },
                            {
                                label: 'Available Trucks',
                                data: makeMockData(30),
                                type: 'line',
                                borderColor: '#ef4444',
                                tension: 0.1,
                                fill: false
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: {
                            x: { stacked: true },
                            y: { stacked: true, beginAtZero: true }
                        }
                    }
                };

                this.state.chartInstance = new Chart(ctx, config);
            },

            // --- REALTIME ---
            setupRealtimeSubscriptions() {
                supabaseClient.channel('custom-all-channel')
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'dispatches' }, payload => {
                        if (this.state.currentRddId) this.loadDispatches();
                    })
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'available_trucks' }, payload => {
                        this.loadTrucks();
                    })
                    .subscribe();
            }
        };

        // Initialize App on Load
        document.addEventListener('DOMContentLoaded', () => App.init());
    </script>
